        const wilayahJawa = [
            {kel: "Gambir", kec: "Gambir", kota: "Kota Jakarta Pusat"},
            {kel: "Sekeloa", kec: "Coblong", kota: "Kota Bandung"},
            {kel: "Sekayu", kec: "Semarang Tengah", kota: "Kota Semarang"},
            {kel: "Sosromenduran", kec: "Gedongtengen", kota: "Kota Yogyakarta"},

            {kel: "Cililitan", kec: "Kramat Jati", kota: "Kota Jakarta Timur"},
            {kel: "Melawai", kec: "Kebayoran Baru", kota: "Kota Jakarta Selatan"},
            {kel: "Tomang", kec: "Grogol Petamburan", kota: "Kota Jakarta Barat"},
            {kel: "Penjaringan", kec: "Penjaringan", kota: "Kota Jakarta Utara"},
            {kel: "Pasteur", kec: "Sukajadi", kota: "Kota Bandung"},
            {kel: "Manahan", kec: "Banjarsari", kota: "Kota Surakarta"},
            {kel: "Oro-Oro Dowo", kec: "Klojen", kota: "Kota Malang"},
            {kel: "Mustikajaya", kec: "Mustikajaya", kota: "Kota Bekasi"},
            {kel: "Baranangsiang", kec: "Bogor Timur", kota: "Kota Bogor"},
            {kel: "Kesenden", kec: "Kejaksan", kota: "Kota Cirebon"},
            {kel: "Tegalsari", kec: "Tegalsari", kota: "Kota Tegal"},
            {kel: "Curug", kec: "Cimanggis", kota: "Kota Depok"},
            {kel: "Regol Wetan", kec: "Sumedang Selatan", kota: "Kab. Sumedang"}
        ];

        const prefixHp = ["0812", "0813", "0821", "0822", "0856", "0857", "0878", "0896", "0823", "0819"];

        function acak(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function angkaAcak(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function bikinSeribuData() {
            let kumpulanData = [];
            let totalDataTerget = 1000;

            for(let i = 0; i < totalDataTerget; i++) {
                let namaFinal = "";
                if(Math.random() > 0.5) {
                    namaFinal = acak(namaDepan) + " " + acak(namaBelakang);
                } else {
                    namaFinal = acak(namaPerempuan);
                    if(Math.random() > 0.4) namaFinal += " " + acak(namaBelakang);
                }

                let jln = acak(listJalan) + " No. " + angkaAcak(1, 250);
                let pat = "(" + acak(listPatokan) + ")";
                let wil = acak(wilayahJawa);
                let alamatFinal = `${jln} ${pat}, Kel. ${wil.kel}, Kec. ${wil.kec}, ${wil.kota}`;

                let noHpFinal = acak(prefixHp) + angkaAcak(10000000, 99999999);

                kumpulanData.push({
                    nama: namaFinal,
                    alamat: alamatFinal,
                    no_hp: noHpFinal
                });
            }

            document.getElementById("outputJson").value = JSON.stringify(kumpulanData, null, 2);
            alert("Selesai! 1000 Data Berhasil Dibuat. Silakan copy isi kotak teks.");
        }
    </script>
</body>
</html>
