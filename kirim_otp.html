<div style="margin-top: 30px; padding: 25px; background: #1a1a1a; border-radius: 10px; border: 1px solid #00ffcc; text-align: left; max-width: 550px; margin-left: auto; margin-right: auto; font-family: sans-serif; color: #fff;">
    
    <h3 style="color: #00ffcc; margin-top: 0; text-align: center; border-bottom: 1px dashed #333; padding-bottom: 10px;">
        ⚙️ Panel Kontrol OTP Instan
    </h3>

    <div style="background: #222; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #333;">
        <label style="font-size: 13px; color: #00ffcc; font-weight: bold;">🔑 Pengaturan API Key Anda:</label>
        <div style="display: flex; margin-top: 5px; gap: 10px;">
            <input type="password" id="otpApiKeyInput" placeholder="Masukkan API Key dari Dashboard" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #111; color: #fff; font-size: 14px;">
            <button onclick="simpanApiKey()" style="padding: 10px 15px; background: #00ffcc; color: #111; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Simpan</button>
        </div>
        <small id="statusKey" style="color: #aaa; font-size: 11px; display: block; margin-top: 5px;">Status: API Key belum tersimpan di browser ini.</small>
    </div>

    <div style="background: #222; padding: 15px; border-radius: 6px; border: 1px solid #333;">
        <h4 style="margin-top: 0; color: #fff; border-bottom: 1px solid #333; padding-bottom: 5px;">Kirim SMS / WA OTP</h4>
        
        <div style="margin-bottom: 12px;">
            <label style="font-size: 13px; color: #ccc;">Nomor HP Tujuan:</label>
            <input type="text" id="otpTargetPhone" placeholder="Contoh: 081234567890" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; font-size: 15px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="font-size: 13px; color: #ccc;">Isi Pesan / Kode OTP:</label>
            <textarea id="otpMessageText" placeholder="Contoh: Kode OTP Anda adalah 1234" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; font-size: 14px; height: 70px; resize: none;"></textarea>
        </div>

        <button onclick="eksekusiKirimOtp()" style="width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s;">
            🚀 Jalankan Perintah Kirim
        </button>
    </div>

    <div id="otpConsoleLog" style="margin-top: 15px; padding: 12px; background: #000; border-radius: 5px; font-family: monospace; font-size: 12px; color: #00ff00; display: none; border: 1px solid #222; max-height: 100px; overflow-y: auto;">
        [System]: Menunggu perintah...
    </div>

</div>

<script>
    // Fungsi otomatis saat halaman web dibuka: Cek apakah sudah ada API Key tersimpan
    document.addEventListener("DOMContentLoaded", function() {
        const savedKey = localStorage.getItem("my_otp_api_key");
        if(savedKey) {
            document.getElementById("otpApiKeyInput").value = savedKey;
            document.getElementById("statusKey").innerText = "✅ API Key tersimpan dengan aman di browser ini.";
            document.getElementById("statusKey").style.color = "#00ffcc";
        }
    });

    // Fungsi untuk menyimpan API Key ke memori lokal browser
    function simpanApiKey() {
        const keyInput = document.getElementById("otpApiKeyInput").value.trim();
        if(!keyInput) {
            alert("API Key tidak boleh kosong!");
            return;
        }
        localStorage.setItem("my_otp_api_key", keyInput);
        document.getElementById("statusKey").innerText = "✅ API Key berhasil diperbarui dan disimpan!";
        document.getElementById("statusKey").style.color = "#00ffcc";
        alert("API Key berhasil disimpan di memori browser.");
    }

    // Fungsi Utama: Menembak API OTP Instan di latar belakang (Background Process)
    async function eksekusiKirimOtp() {
        const apiKey = localStorage.getItem("my_otp_api_key");
        const noHp = document.getElementById("otpTargetPhone").value.trim();
        const pesan = document.getElementById("otpMessageText").value.trim();
        const consoleLog = document.getElementById("otpConsoleLog");

        if(!apiKey) {
            alert("⚠️ Anda belum memasukkan dan menyimpan API Key di Bagian 1!");
            return;
        }
        if(!noHp || !pesan) {
            alert("⚠️ Nomor HP dan Isi Pesan tidak boleh kosong!");
            return;
        }

        // Tampilkan kotak log console
        consoleLog.style.display = "block";
        consoleLog.style.color = "#ffcc00";
        consoleLog.innerText = `[Connecting] Menghubungkan ke server otpinstan.com...\nTarget: ${noHp}`;

        // URL API Endpoint (Sesuaikan dengan dokumentasi resmi mereka jika berbeda)
        const ENDPOINT_URL = "https://otpinstan.com/api/v1/send"; 

        try {
            const response = await fetch(ENDPOINT_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}` // Format standard, sesuaikan dengan dokumentasi mereka
                },
                body: JSON.stringify({
                    target: noHp,       // Nama parameter input nomor (cek dokumentasi mereka)
                    message: pesan      // Nama parameter input pesan (cek dokumentasi mereka)
                })
            });

            const dataHasil = await response.json();

            if(response.ok) {
                consoleLog.style.color = "#00ff00";
                consoleLog.innerText = `[Success] Respon Server:\n${JSON.stringify(dataHasil, null, 2)}`;
            } else {
                consoleLog.style.color = "#ff3333";
                consoleLog.innerText = `[Failed] Server menolak permintaan:\nStatus: ${response.status}\nRespon: ${JSON.stringify(dataHasil)}`;
            }

        } catch (error) {
            consoleLog.style.color = "#ff3333";
            consoleLog.innerText = `[Error] Gagal koneksi sistem:\n${error.message}\n(Pastikan server mereka mengizinkan koneksi CORS dari luar)`;
        }
    }
</script>
