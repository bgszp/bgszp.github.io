<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel OTP</title>
    <style>
        body { background-color: #0b0c16; color: #f8f8f2; font-family: sans-serif; margin: 0; padding: 15px; }
        .card { background: #1a1b35; border: 1px solid #2c2e5c; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 12px; background: #5f27cd; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 10px; border-radius: 5px; background: #0b0c16; border: 1px solid #32356b; color: #fff; box-sizing: border-box; }
        .list-item { background: #181933; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; }
    </style>
</head>
<body>

    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin: 0;">📱 Server Shopee</h3>
        <button onclick="refreshData()" style="background:transparent; border:none; color:#00ffcc; cursor:pointer;">🔄 Refresh</button>
    </div>

    <!-- API Key -->
    <div class="card">
        <label style="font-size: 11px; color: #8b8da9;">API KEY:</label>
        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <input type="password" id="apiKey" placeholder="Masukkan API Key...">
            <button onclick="saveKey()" style="background:#00ffcc; border:none; padding:0 15px; border-radius:5px; font-weight:bold;">OK</button>
        </div>
        <div style="margin-top:5px; font-size:12px;">Saldo: <span id="saldo">Rp 0</span></div>
    </div>

    <!-- Order -->
    <button class="btn-main" onclick="orderShopee()">🛒 PESAN NOMOR</button>

    <div style="margin-top: 20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <strong>Riwayat</strong>
            <span onclick="clearHistory()" style="cursor:pointer; color:#ff5555; font-size:12px;">Hapus</span>
        </div>
        <div id="historyList"></div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('my_orders') || '[]');
        
        async function saveKey() {
            localStorage.setItem('otp_key', document.getElementById('apiKey').value);
            refreshData();
        }

        async function refreshData() {
            const key = localStorage.getItem('otp_key');
            if(!key) return;
            // Fetch Saldo
            fetch(`https://corsproxy.io/?https://otpinstan.com/api/reseller/balance.php`, {headers: {'X-Api-Key': key}})
            .then(res => res.json()).then(data => { document.getElementById('saldo').innerText = 'Rp ' + (data.saldo || 0); });
        }

        async function orderShopee() {
            const key = localStorage.getItem('otp_key');
            const res = await fetch(`https://corsproxy.io/?https://otpinstan.com/api/reseller/s1/order.php`, {
                method: 'POST',
                headers: {'X-Api-Key': key, 'Content-Type': 'application/json'},
                body: JSON.stringify({platform_id: 21, country_id: 7})
            });
            const data = await res.json();
            if(data.phone) {
                orders.unshift({id: data.order_id, phone: data.phone, status: 'Menunggu...'});
                localStorage.setItem('my_orders', JSON.stringify(orders));
                render();
            } else { alert("Gagal pesan: " + (data.message || "Error")); }
        }

        function render() {
            const list = document.getElementById('historyList');
            list.innerHTML = orders.map(o => `
                <div class="list-item">
                    <div>${o.phone}</div>
                    <div style="color:#50fa7b;">${o.status}</div>
                </div>
            `).join('');
        }

        function clearHistory() { orders = []; localStorage.removeItem('my_orders'); render(); }
        
        // Loop Cek SMS
        setInterval(async () => {
            const key = localStorage.getItem('otp_key');
            for(let o of orders) {
                if(o.status.includes('Menunggu')) {
                    const res = await fetch(`https://corsproxy.io/?https://otpinstan.com/api/reseller/s1/check.php?order_id=${o.id}`, {headers: {'X-Api-Key': key}});
                    const d = await res.json();
                    if(d.otp) { o.status = "OTP: " + d.otp; render(); localStorage.setItem('my_orders', JSON.stringify(orders)); }
                }
            }
        }, 5000);

        window.onload = () => { 
            document.getElementById('apiKey').value = localStorage.getItem('otp_key') || ''; 
            render(); 
        };
    </script>
</body>
</html>
