<script>
    let currentTrxId = null;     // Menyimpan order_id dari server
    let pollingInterval = null;  // Mesin pencari otomatis

    // 1. OTOMATIS BERJALAN SAAT APLIKASI DIBUKA
    document.addEventListener("DOMContentLoaded", function() {
        const savedKey = localStorage.getItem("otp_key_reseller");
        if(savedKey) {
            document.getElementById("otpKeyV3").value = savedKey;
            document.getElementById("statusKeyV3").innerText = "✅ API Key Terpasang. Siap melakukan order.";
            document.getElementById("statusKeyV3").style.color = "#50fa7b";
            
            // Definisikan daftar layanan berdasarkan ID Platform Server 1 secara manual
            // karena endpoint list service biasanya membutuhkan scroll ke bawah lagi di dokumentasi.
            muatMenuLayananManual();
        }
    });

    function simpanKeyV3() {
        const key = document.getElementById("otpKeyV3").value.trim();
        if(!key) { alert("Masukkan API Key Anda!"); return; }
        localStorage.setItem("otp_key_reseller", key);
        document.getElementById("statusKeyV3").innerText = "✅ API Key Berhasil Disimpan!";
        document.getElementById("statusKeyV3").style.color = "#50fa7b";
        muatMenuLayananManual();
        alert("API Key berhasil dikunci ke dalam aplikasi!");
    }

    // Mengisi menu dropdown sesuai platform_id (Sesuaikan angka id dengan dashboard Anda jika berbeda)
    function muatMenuLayananManual() {
        const selectMenu = document.getElementById("selectLayananLive");
        selectMenu.innerHTML = `
            <option value="21">Shopee (Server 1 Promo) - Rp 340</option>
            <option value="1">WhatsApp (Server 1) - Rp 1.400</option>
            <option value="2">Telegram (Server 1) - Rp 950</option>
            <option value="5">TikTok (Server 1) - Rp 415</option>
        `;
        printLog("Menu Layanan siap digunakan.");
    }

    // 2. FUNGSI UTAMA: ORDER NOMOR (POST REQUEST KE SERVER ASLI)
    async function prosesPesanSekarang() {
        if(pollingInterval) clearInterval(pollingInterval); // Hentikan tracking lama jika ada

        const apiKey = localStorage.getItem("otp_key_reseller");
        const platformIdTerpilih = document.getElementById("selectLayananLive").value;

        if(!apiKey) { alert("Simpan API Key reseller Anda terlebih dahulu!"); return; }
        if(!platformIdTerpilih) { alert("Silakan pilih layanan terlebih dahulu!"); return; }

        printLog("Menghubungkan ke server untuk meminta nomor baru...");

        // Sesuai screenshot: URL untuk melakukan order di Server 1
        const URL_ORDER = "https://otpinstan.com/api/reseller/s1/order.php";

        try {
            const response = await fetch(URL_ORDER, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-Api-Key": apiKey // Menggunakan format header sesuai dokumentasi gambar Anda
                },
                body: JSON.stringify({
                    platform_id: parseInt(platformIdTerpilih),
                    country_id: 7 // Angka 7 merujuk pada kode negara Indonesia di contoh screenshot
                })
            });

            const data = await response.json();

            // Membaca response sukses dari server (Mendapatkan nomor HP & order ID)
            if (data.order_id || data.phone) {
                currentTrxId = data.order_id; // Simpan ID order untuk cek status SMS nanti

                // Tampilkan komponen nomor ke layar aplikasi Anda
                document.getElementById("panelNomorKosong").style.display = "none";
                document.getElementById("panelNomorAktif").style.display = "block";
                
                // Pasang nomor HP yang diberikan oleh server ke layar
                document.getElementById("txtNomorHp").innerText = data.phone;
                
                // Atur teks status awal ke mode standby berkedip
                const txtOtp = document.getElementById("txtStatusOtp");
                txtOtp.innerText = "⏳ Menunggu SMS...";
                txtOtp.style.background = "#0f111a";
                txtOtp.style.color = "#ff5555";

                printLog(`Nomor didapat! ID: ${currentTrxId}. Sistem memantau SMS secara real-time...`);

                // 🔥 JALANKAN POLLING OTOMATIS SETIAP 5 DETIK SESUAI REKOMENDASI TIPS DI GAMBAR
                pollingInterval = setInterval(pantauOtpMasukRealtime, 5000);
            } else {
                // Jika server merespon tapi gagal (misal: Saldo Rp 0 atau stok habis)
                printLog(`Gagal dari server: ${data.message || JSON.stringify(data)}`);
                alert(`Gagal Order: ${data.message || 'Periksa saldo Anda'}`);
            }

        } catch (error) {
            printLog("Koneksi gagal/Terhalang CORS: " + error.message);
        }
    }

    // 3. FUNGSI PELACAK SMS MASUK REAL-TIME (GET REQUEST)
    async function pantauOtpMasukRealtime() {
        if(!currentTrxId) return;

        const apiKey = localStorage.getItem("otp_key_reseller");
        
        // Sesuai screenshot: URL untuk cek status order
        const URL_CHECK = `https://otpinstan.com/api/reseller/s1/check.php?order_id=${currentTrxId}`;

        try {
            const response = await fetch(URL_CHECK, {
                method: "GET",
                headers: {
                    "X-Api-Key": apiKey
                }
            });

            const data = await response.json();

            // Sesuai keterangan gambar: Cek apakah status sudah 'received' atau field 'otp' sudah terisi
            if (data.status === "received" || data.otp) {
                clearInterval(pollingInterval); // 🛑 Hentikan loop otomatis karena SMS sudah masuk!
                
                // Ambil kode OTP dari field 'otp' seperti instruksi di gambar Anda
                const kodeOtpAsli = data.otp; 
                
                // Tampilkan hasil sukses ke antarmuka aplikasi
                const txtOtp = document.getElementById("txtStatusOtp");
                txtOtp.innerText = kodeOtpAsli;
                txtOtp.style.background = "#50fa7b"; // Ubah latar menjadi hijau neon sukses
                txtOtp.style.color = "#000";
                
                printLog(`[SUKSES] SMS masuk! Kode OTP Anda adalah: ${kodeOtpAsli}`);
                alert(`🎉 OTP Baru Berhasil Diterima: ${kodeOtpAsli}`);
            } else if (data.status === "cancelled" || data.status === "expired") {
                clearInterval(pollingInterval);
                printLog("Transaksi dibatalkan otomatis oleh sistem/provider.");
                document.getElementById("txtStatusOtp").innerText = "❌ Batal / Expired";
            } else {
                printLog(`[Monitoring...] Status order masih: ${data.status || 'pending'}`);
            }

        } catch (error) {
            // Kita biarkan terus berjalan walaupun ada satu interupsi RTO kecil di jaringan
            printLog("Sedang mencoba sinkronisasi ulang dengan server...");
        }
    }

    function printLog(text) {
        document.getElementById("miniConsoleLog").innerText = "└> " + text;
    }
</script>
